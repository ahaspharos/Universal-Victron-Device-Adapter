# VictronBridge configuration
# Copy this file to bridge.override.yaml and adjust the values for your setup.

Bridge:
  Source:
    Type: mqtt       # mqtt | modbustcp | modbusrtu | http

    # MQTT settings — used when Type: mqtt
    Mqtt:
      Host: 192.168.1.100
      Port: 1883
      # Username:
      # Password:
      # UseTls: false
      ClientId: victronbridge
      KeepAliveSeconds: 60
      Topics:
        - battery/#

    # Modbus TCP settings — used when Type: modbustcp
    ModbusTcp:
      Host: 192.168.1.200
      Port: 502
      UnitId: 1
      PollingIntervalSeconds: 5

    # Modbus RTU settings — used when Type: modbusrtu
    ModbusRtu:
      SerialPort: /dev/ttyUSB0
      BaudRate: 9600
      UnitId: 1
      PollingIntervalSeconds: 5

    # HTTP settings — used when Type: http
    Http:
      BaseUrl: http://192.168.1.50/api
      PollingIntervalSeconds: 30

  Device:
    Type: battery
    ServiceName: com.victronenergy.battery.mqtt01
    ProductName: MQTT Battery
    DeviceInstance: 0

  Mappings:
    soc: battery/soc
    voltage: battery/voltage
    current: battery/current
